{{ define "main" }}
  <div class="contact-wrap">
    <h1>{{ .Title }}</h1>

    <form class="contact-form" id="contact-form" action="https://formspree.io/f/maqpkayr" method="POST">
      <input type="hidden" name="_subject" value="New message from kiord.github.io">

      <label for="email">Email</label>
      <input id="email" type="email" name="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="3" required></textarea>

      <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" class="hp-field">

      <button type="submit">Send</button>
      <p class="form-status" id="form-status" aria-live="polite"></p>
    </form>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("contact-form");
        const status = document.getElementById("form-status");

        if (!form || !status) return;

        form.addEventListener("submit", async function (e) {
          e.preventDefault();

          status.textContent = "Sending...";
          status.className = "form-status";

          const data = new FormData(form);

          try {
            const res = await fetch(form.action, {
              method: form.method,
              body: data,
              headers: {
                "Accept": "application/json"
              }
            });

            if (res.ok) {
              form.reset();
              status.textContent = "Message sent ! I'll get back to you soon";
              status.className = "form-status is-success";
            } else {
              status.textContent = "Could not send message.";
              status.className = "form-status is-error";
            }
          } catch (err) {
            status.textContent = "Network error. Please try again.";
            status.className = "form-status is-error";
          }
        });
      });
    </script>
  </div>
{{ end }}
